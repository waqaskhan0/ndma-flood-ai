name: Daily Flood Alerts

on:
  schedule:
    # 01:00 UTC = 06:00 Pakistan Standard Time
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily alert pipeline
        run: python operational_pipeline.py

      - name: Commit updated alerts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/latest_predictions.csv data/processed/active_alerts.csv data/processed/active_alerts.json
          git diff --cached --quiet || git commit -m "Update daily flood alerts"
          git push
